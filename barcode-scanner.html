<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>在庫スキャナー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--accent:#4285f4;--accent2:#34a853;--text:#e6edf3;--muted:#7d8590;--success:#3fb950;--error:#f85149;--warning:#d29922}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
  .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  header h1{font-size:17px;font-weight:700}
  header span{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto}
  .container{padding:16px;max-width:480px;margin:0 auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden}
  .card-title{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;justify-content:space-between}
  .card-body{padding:16px}
  .flabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:6px}
  .finput{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;font-family:'Share Tech Mono',monospace;font-size:13px;border-radius:6px;outline:none;transition:border-color .2s;margin-bottom:12px}
  .finput:focus{border-color:var(--accent)}
  .finput::placeholder{color:#444}
  select.finput option{background:var(--surface)}

  .btn-check{width:100%;padding:10px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:6px}
  .btn-check:active{background:var(--border)}

  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .photo-thumb{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;background:#111;border:1px solid var(--border)}
  .photo-thumb img{width:100%;height:100%;object-fit:cover}
  .remove-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(248,81,73,.9);border:none;border-radius:50%;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1}
  .status-badge{position:absolute;bottom:0;left:0;right:0;font-size:10px;font-weight:700;padding:3px 4px;text-align:center}
  .status-badge.pending{background:rgba(20,20,20,.85);color:var(--muted)}
  .status-badge.analyzing{background:rgba(66,133,244,.92);color:#fff}
  .status-badge.ok{background:rgba(52,168,83,.92);color:#fff}
  .status-badge.error{background:rgba(248,81,73,.92);color:#fff}
  .lcount{position:absolute;top:4px;left:4px;background:rgba(52,168,83,.9);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;display:none}
  .lcount.show{display:block}
  .add-btn{aspect-ratio:1;border-radius:6px;border:2px dashed var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:12px;font-family:'Noto Sans JP',sans-serif}
  .add-btn .plus{font-size:28px;line-height:1;color:var(--muted)}

  .progress-wrap{margin-bottom:10px;display:none}
  .progress-wrap.show{display:block}
  .progress-label{font-size:12px;color:var(--muted);margin-bottom:5px}
  .progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;width:0%}

  .err-log{background:#160808;border:1px solid #5a1a1a;border-radius:8px;padding:10px 12px;margin-bottom:10px;display:none;max-height:100px;overflow-y:auto}
  .err-log.show{display:block}
  .err-log p{font-family:'Share Tech Mono',monospace;font-size:11px;color:#ff8080;line-height:1.6;word-break:break-all}

  .btn{width:100%;padding:14px;border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
  .btn:active{opacity:.8;transform:scale(.98)}
  .btn:disabled{background:var(--border)!important;color:var(--muted)!important;cursor:not-allowed;transform:none}
  .btn-green{background:var(--accent2);color:#fff}
  .btn-blue{background:var(--accent);color:#fff}
  .btn-dark{background:#21262d;color:var(--text);border:1px solid var(--border)}

  .result-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden}
  .result-head{display:grid;grid-template-columns:56px 1fr}
  .result-head img{width:56px;height:56px;object-fit:cover;border-right:1px solid var(--border)}
  .result-head-info{padding:8px 10px;display:flex;align-items:center;gap:6px}
  .result-head-info span{font-size:12px;color:var(--muted)}
  .result-head-info strong{font-size:13px;color:var(--accent2)}
  .label-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:10px 12px;border-top:1px solid var(--border)}
  .linfo .barcode{font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;color:var(--accent)}
  .linfo .date{font-size:11px;color:var(--accent2);margin-top:3px}
  .linfo .lerr{font-size:11px;color:var(--error)}
  .qty-mini{display:flex;align-items:center;gap:5px}
  .qty-mini button{width:28px;height:28px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
  .qty-mini input{width:34px;text-align:center;background:transparent;border:none;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;outline:none}

  .dt-box{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--accent);background:var(--bg);border:1px solid var(--border);padding:10px 12px;border-radius:8px;margin-bottom:12px}
  .summary{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:none;justify-content:space-between;align-items:center;margin-bottom:12px}
  .summary.show{display:flex}
  .summary span{font-size:13px;color:var(--muted)}
  .summary strong{font-family:'Share Tech Mono',monospace;color:var(--accent)}

  .log-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .log-head span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
  .log-badge{font-family:'Share Tech Mono',monospace;font-size:11px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:20px;font-weight:700}
  .log-body{max-height:260px;overflow-y:auto}
  .log-item{padding:10px 16px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto;gap:2px}
  .log-item:last-child{border-bottom:none}
  .log-code{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700}
  .log-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .log-st{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;align-self:center}
  .log-st.ok{background:rgba(63,185,80,.15);color:var(--success)}
  .log-st.err{background:rgba(248,81,73,.15);color:var(--error)}
  .log-st.pending{background:rgba(210,153,34,.15);color:var(--warning)}
  .log-empty{padding:28px;text-align:center;color:var(--muted);font-size:13px}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);color:var(--text);border:1px solid var(--border);padding:12px 20px;border-radius:8px;font-size:14px;font-weight:700;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);border-left:3px solid var(--success);max-width:88vw;text-align:center}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.error{border-left-color:var(--error)}
  .spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <div class="dot"></div>
  <h1>在庫スキャナー</h1>
  <span>v6.9</span>
</header>
<div class="container">

  <div class="card">
    <div class="card-title">🔑 Gemini API Key &amp; モデル</div>
    <div class="card-body">
      <label class="flabel">API Key</label>
      <input type="password" class="finput" id="apiKey" placeholder="AIza..." onchange="saveApiKey()" onblur="saveApiKey()" />
      <button class="btn-check" id="btnCheck" onclick="fetchModels()">🔍 使えるモデルを確認する</button>
      <label class="flabel">モデル</label>
      <select class="finput" id="modelSelect">
        <option value="gemini-1.5-flash-latest">gemini-1.5-flash-latest</option>
        <option value="gemini-1.5-pro-latest">gemini-1.5-pro-latest</option>
        <option value="gemini-2.0-flash-lite">gemini-2.0-flash-lite</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <span>📸 ラベル写真</span>
      <span id="photoCount" style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent)">0枚</span>
    </div>
    <div class="card-body">
      <div class="photo-grid" id="photoGrid">
        <button class="add-btn" onclick="document.getElementById('fileInput').click()">
          <div class="plus">＋</div>
          <span>追加</span>
        </button>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="onPhotos(event)" />
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-label" id="progressLabel">解析中...</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div class="err-log" id="errLog"><p id="errText"></p></div>
      <button class="btn btn-green" id="btnAnalyze" onclick="analyzeAll()" disabled>✨ Gemini で解析</button>
      <button class="btn btn-dark" onclick="clearAll()">🗑 すべてクリア</button>
    </div>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <div class="card-title">
      <span>📋 解析結果</span>
      <span id="resultCount" style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent2)"></span>
    </div>
    <div class="card-body" style="padding:12px"><div id="resultList"></div></div>
  </div>

  <div class="card">
    <div class="card-title">🚀 送信設定</div>
    <div class="card-body">
      <label class="flabel">スキャン日時</label>
      <div class="dt-box" id="dtBox">--</div>
      <label class="flabel">Google Apps Script URL</label>
      <input type="url" class="finput" id="gasUrl" placeholder="https://script.google.com/macros/s/..." onchange="saveGasUrl()" onblur="saveGasUrl()" />
      <div class="summary" id="summary"><span>送信件数</span><strong id="summaryCount">0件</strong></div>
      <button class="btn btn-blue" id="btnSubmit" onclick="submitAll()" disabled>📊 スプレッドシートに一括送信</button>
    </div>
  </div>

  <div class="card" style="margin-bottom:32px">
    <div class="log-head"><span>送信ログ</span><span class="log-badge" id="logBadge">0</span></div>
    <div class="log-body" id="logBody"><div class="log-empty">まだ送信履歴がありません</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// APIキーをlocalStorageに保存・復元
function saveApiKey(){const k=document.getElementById("apiKey").value.trim();if(k)localStorage.setItem("gemini_api_key",k);}
function saveGasUrl(){const g=document.getElementById("gasUrl").value.trim();if(g)localStorage.setItem("gas_url",g);}
function loadApiKey(){
  const k=localStorage.getItem("gemini_api_key");
  if(k) document.getElementById("apiKey").value=k;
  const g=localStorage.getItem("gas_url");
  if(g) document.getElementById("gasUrl").value=g;
}

loadApiKey();

// 日時更新
setInterval(()=>{
  document.getElementById('dtBox').textContent = new Date().toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
}, 1000);

let photos=[], logs=[], nextId=1, allLabels=[];

// ★モデル一覧取得
async function fetchModels() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showToast('APIキーを入力してください', true); return; }
  showToast('モデル一覧を取得中...');
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
    const data = await res.json();
    if (data.error) { showToast('エラー: ' + data.error.message, true); return; }
    const models = data.models
      .filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent'))
      .map(m => m.name.replace('models/', ''));

    // セレクトボックスを更新
    const sel = document.getElementById('modelSelect');
    sel.innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('');
    showToast('✅ ' + models.length + '件のモデルを取得しました');
  } catch(e) {
    showToast('取得失敗: ' + e.message, true);
  }
}

// ★画像リサイズ（Canvas経由でJPEG変換）
function resizeImage(dataUrl, maxSize=1200) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.88));
    };
    img.src = dataUrl;
  });
}

function onPhotos(e) {
  Array.from(e.target.files).forEach(async file => {
    const reader = new FileReader();
    reader.onload = async ev => {
      const resized = await resizeImage(ev.target.result, 1200);
      photos.push({
        id: nextId++,
        dataUrl: resized,
        base64: resized.split(',')[1],
        status: 'pending',
        labels: []
      });
      renderGrid();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderGrid() {
  document.getElementById('photoCount').textContent = photos.length + '枚';
  let html = photos.map(p => `
    <div class="photo-thumb" id="thumb-${p.id}">
      <img src="${p.dataUrl}" />
      <button class="remove-btn" onclick="removePhoto(${p.id})">✕</button>
      <div class="lcount ${p.labels.length>0?'show':''}" id="lcount-${p.id}">${p.labels.length}件</div>
      <div class="status-badge ${p.status}" id="badge-${p.id}">
        ${p.status==='ok'?`✓ ${p.labels.length}件`:p.status==='pending'?'未解析':p.status==='analyzing'?'解析中...':'✗ 失敗'}
      </div>
    </div>`).join('');
  html += `<button class="add-btn" onclick="document.getElementById('fileInput').click()"><div class="plus">＋</div><span>追加</span></button>`;
  document.getElementById('photoGrid').innerHTML = html;
  document.getElementById('btnAnalyze').disabled = photos.length === 0;
  updateSubmitBtn();
}

function removePhoto(id) { photos = photos.filter(p=>p.id!==id); renderGrid(); renderResults(); }

function clearAll() {
  photos = []; allLabels = [];
  renderGrid(); renderResults();
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('errLog').classList.remove('show');
}

async function analyzeAll() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const model = document.getElementById('modelSelect').value;
  if (!apiKey) { showToast('APIキーを入力してください', true); return; }
  if (!model) { showToast('モデルを選択してください', true); return; }
  if (!photos.length) { showToast('写真を選択してください', true); return; }

  document.getElementById('btnAnalyze').disabled = true;
  document.getElementById('progressWrap').classList.add('show');
  document.getElementById('errLog').classList.remove('show');
  allLabels = [];
  const errs = [];

  for (let i=0; i<photos.length; i++) {
    const p = photos[i];
    p.status = 'analyzing'; p.labels = [];
    updateBadge(p);
    document.getElementById('progressLabel').textContent = `解析中: ${i+1}/${photos.length}枚`;
    document.getElementById('progressFill').style.width = ((i+1)/photos.length*100) + '%';
    try {
      const labels = await callGemini(apiKey, model, p.base64);
      p.labels = labels.map(l=>({...l, qty:1}));
      p.status = p.labels.length > 0 ? 'ok' : 'error';
      if (!p.labels.length) errs.push(`写真${i+1}: ラベル0件`);
      allLabels.push(...p.labels.map(l=>({...l, dataUrl:p.dataUrl})));
    } catch(e) {
      p.status = 'error';
      errs.push(`写真${i+1}: ${e.message}`);
    }
    updateBadge(p);
    if (i < photos.length-1) await sleep(1000);
  }

  document.getElementById('progressWrap').classList.remove('show');
  document.getElementById('btnAnalyze').disabled = false;
  if (errs.length) {
    document.getElementById('errLog').classList.add('show');
    document.getElementById('errText').textContent = errs.join('\n');
  }
  renderResults();
  showToast(allLabels.length > 0 ? `✅ ${allLabels.length}件検出！` : '❌ 読み取り失敗', allLabels.length === 0);
  updateSubmitBtn();
}

async function callGemini(apiKey, model, base64) {
  const prompt = `画像内のラベルシールをすべて読み取ってください。

各ラベルから以下を抽出してください：
1. category：ラベル上部の種別（例：Sashimifillet、Sashimiwith shell）
2. product：商品名（日本語・英語・タイ語すべて）
3. barcode：バーコード下の品番（21で始まる英数字。例：21BESS00019）
4. date：「ผลิต」の下の製造日（YYYY-MM-DD形式）
5. weight_g：重量をグラム換算した整数（0.19kg→190）

重要なルール：
- 画像が斜め・ぼやけていて読み取れない項目は空文字("")にしてください
- 読み取れる項目だけ入力し、無理に推測しないでください
- ラベルが複数あればすべて返してください

JSON配列のみで返答：
[{"category":"","product":"","barcode":"","date":"","weight_g":0}]`

  // 30秒でタイムアウト
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 30000);
  let res;
  try {
    res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        signal: controller.signal,
        body: JSON.stringify({
          contents: [{parts: [
            {text: prompt},
            {inline_data: {mime_type: 'image/jpeg', data: base64}}
          ]}],
          generationConfig: {temperature: 0, maxOutputTokens: 1000}
        })
      }
    );
  } catch(e) {
    if (e.name === 'AbortError') throw new Error('タイムアウト（30秒）。モデルを変えて再試行してください');
    throw e;
  } finally {
    clearTimeout(timer);
  }

  const data = await res.json();
  if (data.error) throw new Error('API ' + data.error.code + ': ' + data.error.message);
  if (!data.candidates?.[0]?.content?.parts?.[0]?.text) throw new Error('レスポンス異常: ' + JSON.stringify(data).slice(0,100));

  const text = data.candidates[0].content.parts[0].text.trim();
  // JSONを確実に抽出
  // Step1: バッククォートブロックを除去
  let t = text.trim();
  const BT = String.fromCharCode(96); // バッククォート
  const TRIPLE = BT+BT+BT;
  if (t.indexOf(TRIPLE) !== -1) {
    const parts = t.split(TRIPLE);
    // parts[1] がコードブロックの中身（```json\n...\n```）
    if (parts.length >= 3) {
      let inner = parts[1];
      // 先頭の "json" を除去
      inner = inner.replace(/^json\s*/i, '').trim();
      t = inner;
    }
  }
  
  // Step2: JSON配列を抽出
  const match = t.match(/\[[\s\S]*\]/);
  if (!match) {
    if (t.includes('[]') || text.includes('[]')) return [];
    throw new Error('JSON未検出: ' + text.slice(0,100));
  }
  try {
    const parsed = JSON.parse(match[0]);
    return Array.isArray(parsed) ? parsed.filter(l => l.barcode || l.date) : [];
  } catch(e) {
    throw new Error('JSONパース失敗');
  }
}

async function submitAll(){
  const gasUrl=document.getElementById('gasUrl').value.trim();
  if(!gasUrl){showToast('Apps Script URLを入力してください',true);return;}
  const targets=allLabels.filter(l=>l.barcode||l.date);
  if(!targets.length)return;
  const btn=document.getElementById('btnSubmit');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div> 送信中...';
  const dt=document.getElementById('dtBox').textContent;
  let ok=0;
  for(const l of targets){
    const logId=addLog(l.barcode,l.date,l.qty,dt,'pending');
    try{await fetch(gasUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({barcode:l.barcode,category:l.category,product:l.product,mfg_date:l.date,weight_g:l.weight_g,quantity:l.qty,datetime:dt})});updateLog(logId,'ok');ok++;}
    catch(e){updateLog(logId,'err');}
    await sleep(200);
  }
  showToast(`✅ ${ok}件送信完了！`);clearAll();
  btn.disabled=false;btn.innerHTML='📊 スプレッドシートに一括送信';
}

function addLog(code,date,qty,dt,status){const id=Date.now()+Math.random();logs.unshift({id,code,date,qty,dt,status});renderLogs();return id;}
function updateLog(id,status){const item=logs.find(l=>l.id===id);if(item){item.status=status;renderLogs();}}
function renderLogs(){
  document.getElementById('logBadge').textContent=logs.length;
  const body=document.getElementById('logBody');
  if(!logs.length){body.innerHTML='<div class="log-empty">まだ送信履歴がありません</div>';return;}
  const lbl={ok:'✓ 完了',err:'✗ エラー',pending:'⋯ 送信中'};
  body.innerHTML=logs.map(l=>`<div class="log-item"><div><div class="log-code">${l.code||'(未読取)'}</div><div class="log-meta">${l.product||l.barcode||'-'} 製造日:${l.date||'-'} ${l.weight_g?l.weight_g+' ':''}${l.dt}</div></div><div class="log-st ${l.status}">${lbl[l.status]}</div></div>`).join('');
}

let toastTimer;
function showToast(msg,isErr=false){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(isErr?' error':'');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3500);}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
</body>
