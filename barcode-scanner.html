<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>在庫スキャナー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root {
    --bg:#0d1117; --surface:#161b22; --border:#30363d;
    --accent:#00d4aa; --text:#e6edf3; --muted:#7d8590;
    --success:#3fb950; --error:#f85149; --warning:#d29922;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
  .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  header h1{font-size:17px;font-weight:700}
  header span{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto}
  .container{padding:16px;max-width:480px;margin:0 auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;overflow:hidden}
  .card-label{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:8px}
  .gas-pad{padding:14px}
  .gas-pad input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;font-family:'Share Tech Mono',monospace;font-size:12px;border-radius:6px;outline:none;transition:border-color .2s}
  .gas-pad input:focus{border-color:var(--accent)}
  .gas-pad input::placeholder{color:#444}
  #viewport{position:relative;width:100%;background:#000;display:none}
  #viewport.active{display:block}
  #video{width:100%;display:block;max-height:260px;object-fit:cover}
  .scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .scan-box{width:70%;height:100px;position:relative}
  .scan-box::before,.scan-box::after,.scan-box span::before,.scan-box span::after{content:'';position:absolute;width:18px;height:18px;border-color:var(--accent);border-style:solid}
  .scan-box::before{top:0;left:0;border-width:2px 0 0 2px}
  .scan-box::after{top:0;right:0;border-width:2px 2px 0 0}
  .scan-box span::before{bottom:0;left:0;border-width:0 0 2px 2px}
  .scan-box span::after{bottom:0;right:0;border-width:0 2px 2px 0}
  .scan-laser{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:laser 1.8s ease-in-out infinite;box-shadow:0 0 6px var(--accent)}
  @keyframes laser{0%,100%{top:5%}50%{top:90%}}
  .result-area{padding:14px 16px;border-bottom:1px solid var(--border);min-height:64px;display:flex;align-items:center;gap:12px}
  .result-icon{font-size:20px;flex-shrink:0}
  .result-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
  .result-value{font-family:'Share Tech Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);word-break:break-all}
  .result-value.empty{color:var(--muted);font-size:14px;font-weight:400}
  .btn-area{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px 14px}
  .btn-scan{grid-column:span 2;padding:15px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-scan:active{opacity:.8;transform:scale(.98)}
  .btn-scan.scanning{background:var(--error);color:#fff}
  .btn-sub{padding:11px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:6px}
  .btn-sub:active{background:var(--border)}
  .form-pad{padding:16px}
  .form-pad h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
  .field{margin-bottom:14px}
  .qty-row{display:grid;grid-template-columns:44px 1fr 44px;gap:8px;align-items:center}
  .qty-btn{width:44px;height:44px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:22px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .1s}
  .qty-btn:active{background:var(--border)}
  .qty-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;font-family:'Share Tech Mono',monospace;font-size:18px;font-weight:700;text-align:center;border-radius:8px;outline:none}
  .qty-input:focus{border-color:var(--accent)}
  .dt-box{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--accent);background:var(--bg);border:1px solid var(--border);padding:10px 12px;border-radius:8px}
  .btn-submit{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),#00a884);color:#000;border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:900;letter-spacing:.08em;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px}
  .btn-submit:active{opacity:.8;transform:scale(.98)}
  .btn-submit:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none}
  .log-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .log-head span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
  .log-badge{font-family:'Share Tech Mono',monospace;font-size:11px;background:var(--accent);color:#000;padding:2px 8px;border-radius:20px;font-weight:700}
  .log-body{max-height:280px;overflow-y:auto}
  .log-item{padding:12px 16px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto;gap:2px;animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .log-item:last-child{border-bottom:none}
  .log-code{font-family:'Share Tech Mono',monospace;font-size:15px;font-weight:700}
  .log-meta{font-size:12px;color:var(--muted);margin-top:2px}
  .log-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;align-self:center}
  .log-status.ok{background:rgba(63,185,80,.15);color:var(--success)}
  .log-status.err{background:rgba(248,81,73,.15);color:var(--error)}
  .log-status.pending{background:rgba(210,153,34,.15);color:var(--warning)}
  .log-empty{padding:32px;text-align:center;color:var(--muted);font-size:13px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);color:var(--text);border:1px solid var(--border);padding:12px 20px;border-radius:8px;font-size:14px;font-weight:700;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;border-left:3px solid var(--success)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.error{border-left-color:var(--error)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end}
  .modal-bg.active{display:flex}
  .modal{background:var(--surface);width:100%;padding:24px 20px 32px;border-top:1px solid var(--border);border-radius:16px 16px 0 0;animation:slideUp .25s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
  .modal h3{font-size:15px;font-weight:700;margin-bottom:16px}
  .modal input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:14px 12px;font-family:'Share Tech Mono',monospace;font-size:20px;border-radius:8px;outline:none;margin-bottom:14px}
  .modal input:focus{border-color:var(--accent)}
  .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-btn{padding:13px;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none}
  .modal-ok{background:var(--accent);color:#000}
  .modal-cancel{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>在庫スキャナー</h1>
  <span>FISH INVENTORY v2.1</span>
</header>

<div class="container">
  <div class="card">
    <div class="gas-pad">
      <label class="card-label">🔗 Google Apps Script URL</label>
      <input type="url" id="gasUrl" placeholder="https://script.google.com/macros/s/..." />
    </div>
  </div>

  <div class="card">
    <div id="viewport">
      <video id="video" playsinline muted></video>
      <div class="scan-overlay">
        <div class="scan-box"><span></span><div class="scan-laser"></div></div>
      </div>
    </div>
    <div class="result-area">
      <div class="result-icon" id="resultIcon">📷</div>
      <div>
        <div class="result-label">読み取り結果</div>
        <div class="result-value empty" id="resultValue">スキャン待ち...</div>
      </div>
    </div>
    <div class="btn-area">
      <button class="btn-scan" id="btnScan" onclick="toggleScan()">📷 カメラでスキャン</button>
      <button class="btn-sub" onclick="openManual()">✏️ 手動入力</button>
      <button class="btn-sub" onclick="clearResult()">✕ クリア</button>
    </div>
  </div>

  <div class="card">
    <div class="form-pad">
      <h3>📋 出荷情報</h3>
      <div class="field">
        <label class="card-label">数量</label>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <input class="qty-input" type="number" id="qtyInput" value="1" min="1" max="999" />
          <button class="qty-btn" onclick="changeQty(1)">＋</button>
        </div>
      </div>
      <div class="field">
        <label class="card-label">スキャン日時</label>
        <div class="dt-box" id="dtBox">--</div>
      </div>
      <button class="btn-submit" id="btnSubmit" onclick="submitData()" disabled>🚀 スプレッドシートに送信</button>
    </div>
  </div>

  <div class="card" style="margin-bottom:24px">
    <div class="log-head">
      <span>送信ログ</span>
      <span class="log-badge" id="logBadge">0</span>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-empty">まだ送信履歴がありません</div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>バーコード番号を手入力</h3>
    <input type="text" id="manualInput" placeholder="例: 4912345678901" inputmode="numeric" />
    <div class="modal-btns">
      <button class="modal-btn modal-cancel" onclick="closeManual()">キャンセル</button>
      <button class="modal-btn modal-ok" onclick="confirmManual()">確定</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 日時更新
setInterval(()=>{
  document.getElementById('dtBox').textContent =
    new Date().toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

let scanning = false, stream = null, currentBarcode = '', logs = [];
let lastCode = '', lastTime = 0, scanInterval = null;

// カメラ制御
async function toggleScan() {
  scanning ? stopScan() : await startScan();
}

async function startScan() {
  const btn = document.getElementById('btnScan');
  btn.textContent = '⏹ スキャン停止';
  btn.classList.add('scanning');
  scanning = true;

  try {
    // 背面カメラを指定
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    document.getElementById('viewport').classList.add('active');

    // ZXingを動的ロード
    await loadZXing();
    startDecoding(video);

  } catch(e) {
    showToast('カメラ起動失敗: ' + e.message, true);
    stopScan();
  }
}

function stopScan() {
  scanning = false;
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('viewport').classList.remove('active');
  const btn = document.getElementById('btnScan');
  btn.textContent = '📷 カメラでスキャン';
  btn.classList.remove('scanning');
}

// ZXing動的ロード
let zxingLoaded = false;
let zxingReader = null;

async function loadZXing() {
  if (zxingLoaded) return;
  return new Promise((resolve, reject) => {
    // ZXing をCDNから読み込む
    const script = document.createElement('script');
    script.src = 'https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
    script.onload = () => {
      zxingLoaded = true;
      zxingReader = new ZXing.BrowserMultiFormatReader();
      resolve();
    };
    script.onerror = () => reject(new Error('ZXingの読み込みに失敗'));
    document.head.appendChild(script);
  });
}

function startDecoding(video) {
  if (!zxingReader) return;

  zxingReader.decodeFromVideoElement(video).then(result => {
    if (!scanning) return;
    const code = result.getText();
    const now = Date.now();
    if (code === lastCode && now - lastTime < 2000) return;
    lastCode = code; lastTime = now;
    onDetected(code);
  }).catch(err => {
    // NotFoundException は無視（フレームごとに発生する）
    if (err && err.name !== 'NotFoundException') {
      // デコードし続ける
    }
    if (scanning) {
      setTimeout(() => startDecoding(video), 300);
    }
  });
}

function onDetected(code) {
  setBarcode(code);
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
  showToast('✅ ' + code);
  stopScan();
}

function setBarcode(code) {
  currentBarcode = code;
  const el = document.getElementById('resultValue');
  el.textContent = code; el.classList.remove('empty');
  document.getElementById('resultIcon').textContent = '✅';
  document.getElementById('btnSubmit').disabled = false;
}

function clearResult() {
  currentBarcode = ''; lastCode = '';
  const el = document.getElementById('resultValue');
  el.textContent = 'スキャン待ち...'; el.classList.add('empty');
  document.getElementById('resultIcon').textContent = '📷';
  document.getElementById('btnSubmit').disabled = true;
  document.getElementById('qtyInput').value = 1;
}

// 手動入力
function openManual() {
  document.getElementById('modalBg').classList.add('active');
  setTimeout(() => document.getElementById('manualInput').focus(), 100);
}
function closeManual() {
  document.getElementById('modalBg').classList.remove('active');
  document.getElementById('manualInput').value = '';
}
function confirmManual() {
  const v = document.getElementById('manualInput').value.trim();
  if (v) { setBarcode(v); showToast('入力: ' + v); }
  closeManual();
}
document.getElementById('manualInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmManual();
});

// 数量
function changeQty(d) {
  const el = document.getElementById('qtyInput');
  el.value = Math.max(1, Math.min(999, parseInt(el.value||1) + d));
}

// 送信
async function submitData() {
  const gasUrl = document.getElementById('gasUrl').value.trim();
  if (!gasUrl) { showToast('⚠️ Apps Script URLを入力してください', true); return; }
  if (!currentBarcode) { showToast('⚠️ バーコードをスキャンしてください', true); return; }

  const qty = parseInt(document.getElementById('qtyInput').value) || 1;
  const dt = document.getElementById('dtBox').textContent;
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = '送信中...';

  const logId = addLog(currentBarcode, qty, dt, 'pending');
  try {
    await fetch(gasUrl, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ barcode: currentBarcode, quantity: qty, datetime: dt })
    });
    updateLog(logId, 'ok');
    showToast('✅ 送信完了！');
    clearResult();
  } catch(e) {
    updateLog(logId, 'err');
    showToast('❌ 送信失敗', true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🚀 スプレッドシートに送信';
  }
}

// ログ
function addLog(code, qty, dt, status) {
  const id = Date.now();
  logs.unshift({ id, code, qty, dt, status });
  renderLogs(); return id;
}
function updateLog(id, status) {
  const item = logs.find(l => l.id === id);
  if (item) { item.status = status; renderLogs(); }
}
function renderLogs() {
  document.getElementById('logBadge').textContent = logs.length;
  const body = document.getElementById('logBody');
  if (!logs.length) { body.innerHTML = '<div class="log-empty">まだ送信履歴がありません</div>'; return; }
  const lbl = { ok:'✓ 完了', err:'✗ エラー', pending:'⋯ 送信中' };
  body.innerHTML = logs.map(l => `
    <div class="log-item">
      <div><div class="log-code">${l.code}</div><div class="log-meta">数量: ${l.qty} ・ ${l.dt}</div></div>
      <div class="log-status ${l.status}">${lbl[l.status]}</div>
    </div>`).join('');
}

// トースト
let toastTimer;
function showToast(msg, isErr=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isErr ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>
