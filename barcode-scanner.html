<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>在庫スキャナー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root {
    --bg:#0d1117; --surface:#161b22; --border:#30363d;
    --accent:#4285f4; --accent2:#34a853; --text:#e6edf3; --muted:#7d8590;
    --success:#3fb950; --error:#f85149; --warning:#d29922;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
  .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  header h1{font-size:17px;font-weight:700}
  header span{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto}

  .container{padding:16px;max-width:480px;margin:0 auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden}
  .card-title{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;justify-content:space-between}
  .card-body{padding:16px}

  .api-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;font-family:'Share Tech Mono',monospace;font-size:13px;border-radius:6px;outline:none;transition:border-color .2s}
  .api-input:focus{border-color:var(--accent)}
  .api-input::placeholder{color:#444}
  .api-hint{font-size:11px;color:var(--muted);margin-top:6px}
  .api-hint a{color:var(--accent);text-decoration:none}

  /* 写真グリッド */
  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;min-height:80px}
  .photo-thumb{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;background:#000;border:1px solid var(--border)}
  .photo-thumb img{width:100%;height:100%;object-fit:cover}
  .photo-thumb .remove-btn{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(248,81,73,.9);border:none;border-radius:50%;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
  .photo-thumb .status-badge{position:absolute;bottom:4px;left:4px;right:4px;font-size:10px;font-weight:700;padding:2px 4px;border-radius:3px;text-align:center}
  .photo-thumb .status-badge.pending{background:rgba(210,153,34,.9);color:#fff}
  .photo-thumb .status-badge.ok{background:rgba(63,185,80,.9);color:#fff}
  .photo-thumb .status-badge.error{background:rgba(248,81,73,.9);color:#fff}
  .photo-thumb .status-badge.analyzing{background:rgba(66,133,244,.9);color:#fff}

  .add-photo-btn{aspect-ratio:1;border-radius:6px;border:2px dashed var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:11px;transition:border-color .2s}
  .add-photo-btn:active{border-color:var(--accent)}
  .add-photo-btn span{font-size:24px}

  .btn-primary{width:100%;padding:14px;border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
  .btn-primary:active{opacity:.8;transform:scale(.98)}
  .btn-primary:disabled{background:var(--border)!important;color:var(--muted);cursor:not-allowed;transform:none}
  .btn-blue{background:var(--accent);color:#fff}
  .btn-green{background:var(--accent2);color:#fff}
  .btn-dark{background:#21262d;color:var(--text);border:1px solid var(--border)}

  /* 進捗 */
  .progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:12px;overflow:hidden;display:none}
  .progress-bar.show{display:block}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s ease;width:0%}
  .progress-text{font-size:12px;color:var(--muted);margin-bottom:8px;display:none}
  .progress-text.show{display:block}

  /* 結果リスト */
  .result-list{display:grid;gap:8px;margin-bottom:0}
  .result-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;display:grid;grid-template-columns:56px 1fr auto;gap:8px;align-items:center}
  .result-item img{width:56px;height:56px;object-fit:cover;border-radius:4px;border:1px solid var(--border)}
  .result-item .info .barcode{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);margin-bottom:3px;word-break:break-all}
  .result-item .info .date{font-size:12px;color:var(--accent2)}
  .result-item .info .err{font-size:12px;color:var(--error)}
  .result-item .qty-mini{display:flex;flex-direction:column;align-items:center;gap:4px}
  .result-item .qty-mini button{width:28px;height:28px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
  .result-item .qty-mini input{width:36px;text-align:center;background:transparent;border:none;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;outline:none}

  .dt-box{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--accent);background:var(--bg);border:1px solid var(--border);padding:10px 12px;border-radius:8px;margin-bottom:12px}

  .gas-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;font-family:'Share Tech Mono',monospace;font-size:12px;border-radius:6px;outline:none;margin-bottom:12px}
  .gas-input:focus{border-color:var(--accent)}
  .gas-input::placeholder{color:#444}

  .summary-bar{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:13px}
  .summary-bar span{color:var(--muted)}
  .summary-bar strong{color:var(--accent);font-family:'Share Tech Mono',monospace}

  .log-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .log-head span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
  .log-badge{font-family:'Share Tech Mono',monospace;font-size:11px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:20px;font-weight:700}
  .log-body{max-height:260px;overflow-y:auto}
  .log-item{padding:10px 16px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr auto;gap:2px;animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .log-item:last-child{border-bottom:none}
  .log-code{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700}
  .log-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .log-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;align-self:center}
  .log-status.ok{background:rgba(63,185,80,.15);color:var(--success)}
  .log-status.err{background:rgba(248,81,73,.15);color:var(--error)}
  .log-status.pending{background:rgba(210,153,34,.15);color:var(--warning)}
  .log-empty{padding:28px;text-align:center;color:var(--muted);font-size:13px}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);color:var(--text);border:1px solid var(--border);padding:12px 20px;border-radius:8px;font-size:14px;font-weight:700;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);border-left:3px solid var(--success);max-width:85vw;text-align:center}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.error{border-left-color:var(--error)}

  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  #fileInput{display:none}
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>在庫スキャナー</h1>
  <span>Gemini v3.1</span>
</header>

<div class="container">

  <!-- APIキー -->
  <div class="card">
    <div class="card-title">🔑 Gemini API Key</div>
    <div class="card-body">
      <input class="api-input" type="password" id="apiKey" placeholder="AIza..." />
      <div class="api-hint">取得先: <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> → Get API key</div>
    </div>
  </div>

  <!-- 写真選択 -->
  <div class="card">
    <div class="card-title">
      <span>📸 ラベル写真</span>
      <span id="photoCount" style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent)">0枚</span>
    </div>
    <div class="card-body">
      <div class="photo-grid" id="photoGrid">
        <button class="add-photo-btn" onclick="document.getElementById('fileInput').click()">
          <span>＋</span>追加
        </button>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple onchange="onPhotos(event)" />
      <div class="progress-text" id="progressText">解析中: 0 / 0</div>
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      <button class="btn-primary btn-green" id="btnAnalyze" onclick="analyzeAll()" disabled>
        ✨ まとめて Gemini 解析
      </button>
      <button class="btn-primary btn-dark" onclick="clearAll()">🗑 すべてクリア</button>
    </div>
  </div>

  <!-- 解析結果 -->
  <div class="card" id="resultCard" style="display:none">
    <div class="card-title">
      <span>📋 解析結果</span>
      <span id="resultCount" style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent2)"></span>
    </div>
    <div class="card-body">
      <div class="result-list" id="resultList"></div>
    </div>
  </div>

  <!-- 送信 -->
  <div class="card">
    <div class="card-title">🚀 送信設定</div>
    <div class="card-body">
      <label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:6px">スキャン日時</label>
      <div class="dt-box" id="dtBox">--</div>
      <label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:6px">🔗 Google Apps Script URL</label>
      <input class="gas-input" type="url" id="gasUrl" placeholder="https://script.google.com/macros/s/..." />
      <div class="summary-bar" id="summaryBar" style="display:none">
        <span>送信件数</span>
        <strong id="summaryCount">0件</strong>
      </div>
      <button class="btn-primary btn-blue" id="btnSubmit" onclick="submitAll()" disabled>
        📊 スプレッドシートに一括送信
      </button>
    </div>
  </div>

  <!-- ログ -->
  <div class="card" style="margin-bottom:32px">
    <div class="log-head">
      <span>送信ログ</span>
      <span class="log-badge" id="logBadge">0</span>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-empty">まだ送信履歴がありません</div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// 日時
setInterval(()=>{
  document.getElementById('dtBox').textContent =
    new Date().toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

let photos = []; // {id, dataUrl, base64, mime, barcode, date, qty, status}
let logs = [];
let nextId = 1;

// 写真追加
function onPhotos(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      const base64 = dataUrl.split(',')[1];
      const mime = dataUrl.split(';')[0].split(':')[1];
      photos.push({ id: nextId++, dataUrl, base64, mime, barcode:'', date:'', qty:1, status:'pending' });
      renderGrid();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

// グリッド描画
function renderGrid() {
  const grid = document.getElementById('photoGrid');
  document.getElementById('photoCount').textContent = photos.length + '枚';

  let html = photos.map(p => `
    <div class="photo-thumb" id="thumb-${p.id}">
      <img src="${p.dataUrl}" />
      <button class="remove-btn" onclick="removePhoto(${p.id})">✕</button>
      <div class="status-badge ${p.status}" id="badge-${p.id}">
        ${p.status==='pending'?'未解析':p.status==='analyzing'?'解析中':p.status==='ok'?'✓':p.status==='error'?'✗':''}
      </div>
    </div>
  `).join('');

  html += `<button class="add-photo-btn" onclick="document.getElementById('fileInput').click()"><span>＋</span>追加</button>`;
  grid.innerHTML = html;

  document.getElementById('btnAnalyze').disabled = photos.length === 0;
  updateSubmitBtn();
}

function removePhoto(id) {
  photos = photos.filter(p => p.id !== id);
  renderGrid();
  renderResults();
}

function clearAll() {
  photos = [];
  renderGrid();
  renderResults();
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('summaryBar').style.display = 'none';
  document.getElementById('btnSubmit').disabled = true;
}

// まとめて解析
async function analyzeAll() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showToast('⚠️ APIキーを入力してください', true); return; }
  if (!photos.length) { showToast('⚠️ 写真を選択してください', true); return; }

  document.getElementById('btnAnalyze').disabled = true;
  document.getElementById('progressBar').classList.add('show');
  document.getElementById('progressText').classList.add('show');

  const total = photos.length;
  let done = 0;

  for (const photo of photos) {
    photo.status = 'analyzing';
    updateBadge(photo);

    try {
      const result = await callGemini(apiKey, photo.base64, photo.mime);
      photo.barcode = result.barcode || '';
      photo.date = result.date || '';
      photo.status = (photo.barcode || photo.date) ? 'ok' : 'error';
    } catch(e) {
      photo.status = 'error';
    }

    done++;
    updateBadge(photo);
    document.getElementById('progressFill').style.width = (done/total*100) + '%';
    document.getElementById('progressText').textContent = `解析中: ${done} / ${total}`;

    // レート制限対策：少し待つ
    if (done < total) await sleep(500);
  }

  document.getElementById('progressBar').classList.remove('show');
  document.getElementById('progressText').classList.remove('show');
  document.getElementById('btnAnalyze').disabled = false;

  renderResults();
  const okCount = photos.filter(p=>p.status==='ok').length;
  showToast(`✅ 解析完了 ${okCount}/${total}件`);
  updateSubmitBtn();
}

async function callGemini(apiKey, base64, mime) {
  const prompt = `この画像はラベルシールです。以下2つだけ抽出してください。
1. バーコードの下の英数字コード
2. 製造日または加工日の日付

必ずJSON形式だけで回答：{"barcode":"コード","date":"日付"}
読み取れない場合は空文字。`;

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
    {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{ parts:[
          {text: prompt},
          {inline_data:{mime_type:mime, data:base64}}
        ]}],
        generationConfig:{temperature:0, maxOutputTokens:100}
      })
    }
  );
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const text = data.candidates[0].content.parts[0].text.trim();
  const match = text.match(/\{.*\}/s);
  if (!match) throw new Error('parse error');
  return JSON.parse(match[0]);
}

function updateBadge(photo) {
  const badge = document.getElementById('badge-' + photo.id);
  if (!badge) return;
  badge.className = 'status-badge ' + photo.status;
  badge.textContent = photo.status==='pending'?'未解析':photo.status==='analyzing'?'解析中':photo.status==='ok'?'✓':'✗';
}

// 結果リスト描画
function renderResults() {
  const okPhotos = photos.filter(p => p.status === 'ok' || p.status === 'error');
  if (!okPhotos.length) return;

  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('resultCount').textContent = `${photos.filter(p=>p.status==='ok').length}件成功`;

  document.getElementById('resultList').innerHTML = okPhotos.map(p => `
    <div class="result-item">
      <img src="${p.dataUrl}" />
      <div class="info">
        ${p.status==='ok'
          ? `<div class="barcode">${p.barcode||'(未読取)'}</div><div class="date">📅 ${p.date||'日付なし'}</div>`
          : `<div class="err">❌ 読み取り失敗</div>`
        }
      </div>
      <div class="qty-mini">
        <button onclick="changeItemQty(${p.id},1)">＋</button>
        <input type="number" id="qty-${p.id}" value="${p.qty}" min="1" max="999" onchange="photos.find(x=>x.id===${p.id}).qty=parseInt(this.value)||1" style="width:36px;text-align:center;background:transparent;border:none;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;outline:none" />
        <button onclick="changeItemQty(${p.id},-1)">−</button>
      </div>
    </div>
  `).join('');

  updateSubmitBtn();
}

function changeItemQty(id, delta) {
  const p = photos.find(x => x.id === id);
  if (!p) return;
  p.qty = Math.max(1, Math.min(999, p.qty + delta));
  const el = document.getElementById('qty-' + id);
  if (el) el.value = p.qty;
}

function updateSubmitBtn() {
  const okPhotos = photos.filter(p => p.status === 'ok');
  document.getElementById('btnSubmit').disabled = okPhotos.length === 0;
  if (okPhotos.length > 0) {
    document.getElementById('summaryBar').style.display = 'flex';
    document.getElementById('summaryCount').textContent = okPhotos.length + '件';
  } else {
    document.getElementById('summaryBar').style.display = 'none';
  }
}

// 一括送信
async function submitAll() {
  const gasUrl = document.getElementById('gasUrl').value.trim();
  if (!gasUrl) { showToast('⚠️ Apps Script URLを入力してください', true); return; }

  const okPhotos = photos.filter(p => p.status === 'ok');
  if (!okPhotos.length) return;

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> 送信中...';

  const dt = document.getElementById('dtBox').textContent;
  let successCount = 0;

  for (const p of okPhotos) {
    const logId = addLog(p.barcode, p.date, p.qty, dt, 'pending');
    try {
      await fetch(gasUrl, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ barcode:p.barcode, mfg_date:p.date, quantity:p.qty, datetime:dt })
      });
      updateLog(logId, 'ok');
      successCount++;
    } catch(e) {
      updateLog(logId, 'err');
    }
    await sleep(200);
  }

  showToast(`✅ ${successCount}件送信完了！`);
  clearAll();
  btn.disabled = false;
  btn.innerHTML = '📊 スプレッドシートに一括送信';
}

// ログ
function addLog(code, date, qty, dt, status) {
  const id = Date.now() + Math.random();
  logs.unshift({id,code,date,qty,dt,status});
  renderLogs(); return id;
}
function updateLog(id, status) {
  const item = logs.find(l=>l.id===id);
  if(item){item.status=status;renderLogs();}
}
function renderLogs() {
  document.getElementById('logBadge').textContent = logs.length;
  const body = document.getElementById('logBody');
  if (!logs.length) { body.innerHTML='<div class="log-empty">まだ送信履歴がありません</div>'; return; }
  const lbl={ok:'✓ 完了',err:'✗ エラー',pending:'⋯ 送信中'};
  body.innerHTML = logs.map(l=>`
    <div class="log-item">
      <div>
        <div class="log-code">${l.code||'(未読取)'}</div>
        <div class="log-meta">製造日: ${l.date||'-'} ・ 数量: ${l.qty} ・ ${l.dt}</div>
      </div>
      <div class="log-status ${l.status}">${lbl[l.status]}</div>
    </div>`).join('');
}

let toastTimer;
function showToast(msg,isErr=false) {
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show'+(isErr?' error':'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
</body>
</html>
